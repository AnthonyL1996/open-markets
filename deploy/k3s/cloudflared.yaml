# Cloudflare Tunnel connector for the OpenMarkets server:
# a token-managed tunnel whose public-hostname route (cstrading.udonitus.com → the in-cluster Service) lives in
# Cloudflare, so cloudflared needs only its TUNNEL_TOKEN. The tunnel is an OUTBOUND connection to Cloudflare —
# no port-forward, no exposed home IP. Cloudflare terminates TLS at the edge; in-cluster traffic is plain HTTP.
#
#   CS1 client ─HTTPS─▶ Cloudflare edge ═tunnel(outbound)═▶ cloudflared (this pod) ─HTTP─▶ openmarketsd:8080
#
# The tunnel ("cstrading") + its route + the cstrading.udonitus.com CNAME are provisioned via the Cloudflare API.
# The TUNNEL_TOKEN is stored in a Secret created out-of-band (NOT committed) — see docs/RUNNING-THE-SERVER.md:
#   kubectl -n openmarkets create secret generic cloudflared-token --from-literal=token=<TUNNEL_TOKEN>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: openmarkets
  labels: { app: cloudflared }
spec:
  replicas: 2 # two connectors → HA tunnel (Cloudflare load-balances across them)
  selector:
    matchLabels: { app: cloudflared }
  template:
    metadata:
      labels: { app: cloudflared }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2024.10.0
          args: ["tunnel", "--no-autoupdate", "--metrics", "0.0.0.0:2000", "--loglevel", "info", "run"]
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-token
                  key: token
          livenessProbe:
            httpGet: { path: /ready, port: 2000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 100m, memory: 64Mi }
